<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="512" height="512" shape-rendering="crispEdges">
  <!-- Fondo Negro -->
  <rect width="16" height="16" fill="#000000"/>

  <!-- Estructura del Robot (Cian Neón) -->
  <rect x="7" y="0" width="2" height="3" fill="#00E5FF"/> <!-- Antena -->
  <rect x="4" y="3" width="8" height="7" fill="#00E5FF"/> <!-- Cabeza -->
  <rect x="2" y="5" width="2" height="3" fill="#00E5FF"/> <!-- Oreja Izquierda -->
  <rect x="12" y="5" width="2" height="3" fill="#00E5FF"/> <!-- Oreja Derecha -->
  <rect x="6" y="10" width="4" height="1" fill="#00E5FF"/> <!-- Cuello -->
  <rect x="4" y="11" width="8" height="3" fill="#00E5FF"/> <!-- Torso -->
  <rect x="2" y="12" width="2" height="2" fill="#00E5FF"/> <!-- Brazo Izquierdo -->
  <rect x="12" y="12" width="2" height="2" fill="#00E5FF"/> <!-- Brazo Derecho -->
  <rect x="5" y="14" width="2" height="2" fill="#00E5FF"/> <!-- Pierna Izquierda -->
  <rect x="9" y="14" width="2" height="2" fill="#00E5FF"/> <!-- Pierna Derecha -->

  <!-- Detalles Faciales (Negro para recortar la silueta) -->
  <rect x="5" y="5" width="2" height="2" fill="#000000"/> <!-- Cuenco Ojo Izquierdo -->
  <rect x="9" y="5" width="2" height="2" fill="#000000"/> <!-- Cuenco Ojo Derecho -->
  <rect x="6" y="8" width="4" height="1" fill="#000000"/> <!-- Boca recta (Humor seco) -->

  <!-- Ojos (Luz y Aire) -->
  <rect x="5" y="5" width="2" height="2" fill="#FFC107"/> <!-- Ojo Izquierdo (Ámbar / Luz) -->
  <rect x="9" y="5" width="2" height="2" fill="#29B6F6"/> <!-- Ojo Derecho (Azul / Aire) -->

  <!-- Botones del Pecho (Luz y Aire) -->
  <rect x="5" y="12" width="2" height="1" fill="#FFC107"/> <!-- Botón Izquierdo (Luz) -->
  <rect x="9" y="12" width="2" height="1" fill="#29B6F6"/> <!-- Botón Derecho (Aire) -->
</svg>
